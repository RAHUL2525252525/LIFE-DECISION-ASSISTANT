<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Career Architect | Aether Sovereign</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@300;400;600&family=Poppins:wght@400;600;700&family=Fira+Code:wght@400&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

:root{
--gold:#d4af37;
--gold-bright:#fcf6ba;
--bg-dark:#030303;
--glass:rgba(10,10,10,0.9);
--border:rgba(212,175,55,0.2);
--accent-cyan:#00f2ff;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
background:var(--bg-dark);
color:#fff;
font-family:'Montserrat',sans-serif;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:40px;

background-image:
linear-gradient(rgba(212,175,55,0.03) 1px,transparent 1px),
linear-gradient(90deg,rgba(212,175,55,0.03) 1px,transparent 1px);

background-size:40px 40px;
}

.container{
max-width:900px;
width:100%;
background:var(--glass);
backdrop-filter:blur(50px);
border-radius:40px;
padding:60px;
border:1px solid var(--border);
box-shadow:0 0 100px rgba(0,0,0,1),0 0 40px rgba(212,175,55,0.05);
position:relative;
overflow:hidden;
}

.container::before{
content:"ARCHITECT_V3.1";
position:absolute;
top:20px;
right:40px;
font-family:'Fira Code';
font-size:10px;
color:var(--gold);
opacity:0.4;
}

h2{
font-family:'Cinzel',serif;
font-size:2.8rem;
text-align:center;
background:linear-gradient(to bottom,#fff,var(--gold-bright));
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
letter-spacing:10px;
margin-bottom:8px;
text-transform:uppercase;
}

.subtitle{
text-align:center;
font-size:0.75rem;
color:var(--gold);
margin-bottom:50px;
text-transform:uppercase;
letter-spacing:6px;
font-family:'Poppins',sans-serif;
font-weight:600;
opacity:0.8;
}

.form-deck{
display:grid;
grid-template-columns:1fr 1fr;
gap:25px;
margin-bottom:40px;
}

.input-group{position:relative;}

label{
display:block;
font-family:'Poppins',sans-serif;
font-size:0.7rem;
color:var(--gold);
margin-bottom:12px;
letter-spacing:1.5px;
font-weight:600;
}

select,input[type="text"]{
width:100%;
padding:20px;
border-radius:16px;
border:1px solid var(--border);
background:rgba(0,0,0,0.5);
color:#fff;
font-size:14px;
outline:none;
transition:0.4s;
font-family:'Montserrat',sans-serif;
}

select:focus,input:focus{
border-color:var(--gold);
background:#000;
box-shadow:0 0 25px rgba(212,175,55,0.1);
}

.custom-input{
display:none;
margin-top:10px;
border-style:dashed;
}

.btn-architect{
grid-column:span 2;
padding:25px;
border-radius:20px;
border:none;
cursor:pointer;
font-family:'Poppins',sans-serif;
font-weight:700;
letter-spacing:4px;
color:#000;
background:linear-gradient(135deg,var(--gold-bright),var(--gold));
transition:0.5s;
text-transform:uppercase;
}

.btn-architect:hover{
transform:translateY(-5px);
box-shadow:0 20px 50px rgba(212,175,55,0.3);
}

.visual-context{
margin:20px 0 40px 0;
text-align:center;
opacity:0.7;
border-radius:20px;
overflow:hidden;
border:1px solid var(--border);
}

#careerResults{
display:none;
margin-top:50px;
border-top:1px solid var(--border);
padding-top:50px;
}

.matrix-grid{
display:grid;
grid-template-columns:1fr 1.5fr;
gap:40px;
margin-bottom:40px;
}

.stat-card{
background:rgba(255,255,255,0.02);
padding:25px;
border-radius:24px;
border:1px solid var(--border);
}

.stat-bar{margin-bottom:25px;}

.stat-meta{
display:flex;
justify-content:space-between;
font-size:10px;
font-family:'Poppins',sans-serif;
font-weight:700;
color:var(--gold);
margin-bottom:10px;
letter-spacing:1px;
}

.bar-bg{height:2px;background:rgba(255,255,255,0.05);}

.bar-fill{
height:100%;
background:var(--gold);
width:0%;
transition:width 1.5s ease-out;
box-shadow:0 0 10px var(--gold);
}

.roadmap-terminal{
background:#000;
border:1px solid var(--border);
border-radius:24px;
padding:35px;
font-family:'Montserrat',sans-serif;
font-size:14px;
line-height:1.8;
color:#ccc;
min-height:200px;
}

.terminal-line{
margin-bottom:15px;
display:flex;
gap:15px;
}

.terminal-bullet{
color:var(--gold);
font-family:'Fira Code';
}

.final-verdict{
text-align:center;
padding:50px;
border-radius:30px;
background:radial-gradient(circle at center,rgba(212,175,55,0.1),transparent);
border:1px solid var(--gold);
margin-top:40px;
}

.verdict-label{
font-family:'Poppins',sans-serif;
font-weight:600;
font-size:10px;
letter-spacing:5px;
color:var(--gold);
margin-bottom:20px;
display:block;
}

#finalPath{
font-family:'Cinzel',serif;
font-size:1.8rem;
color:#fff;
text-shadow:0 0 20px rgba(212,175,55,0.3);
}

.cursor{
display:inline-block;
width:10px;
height:18px;
background:var(--gold);
animation:blink 1s infinite;
margin-left:5px;
vertical-align:middle;
}

@keyframes blink{
50%{opacity:0;}
}

@media(max-width:768px){
.form-deck,.matrix-grid{grid-template-columns:1fr;}
.btn-architect{grid-column:span 1;}
}

</style>
</head>

<body>

<div class="container">

<h2>Career Architect</h2>
<p class="subtitle">Future-State Alignment Engine</p>

<form id="careerForm">

<div class="form-deck">

<div class="input-group">
<label><i class="fas fa-microchip"></i> DOMAIN_OF_PASSION</label>

<select id="interestSelect">

<option value="">-- Choose Field --</option>
<option value="Artificial Intelligence">Artificial Intelligence</option>
<option value="Cybersecurity">Cybersecurity</option>
<option value="Fintech">Fintech & DeFi</option>
<option value="Space Exploration">Aero-Space Engineering</option>
<option value="Bio-Hacking">Biotechnology</option>
<option value="Other">CUSTOM_ENTRY</option>

</select>

<input type="text" id="interestInput" class="custom-input" placeholder="Specify Domain...">

</div>

<div class="input-group">

<label><i class="fas fa-bolt"></i> PRIMARY_LEVERAGE_SKILL</label>

<select id="skillsSelect">

<option value="">-- Choose Skill --</option>
<option value="Software Architecture">Software Architecture</option>
<option value="Strategic Leadership">Strategic Leadership</option>
<option value="Creative Design">Creative Design</option>
<option value="Data Sovereignty">Data Science</option>
<option value="Operational Scaling">Operational Scaling</option>
<option value="Other">CUSTOM_ENTRY</option>

</select>

<input type="text" id="skillsInput" class="custom-input" placeholder="Specify Expertise...">

</div>

<button type="submit" class="btn-architect">
Synthesize Career Path
</button>

</div>
</form>

<div class="visual-context"></div>

<div id="careerResults">

<div class="matrix-grid">

<div class="stat-card">

<div class="stat-bar">
<div class="stat-meta"><span>MARKET_DEMAND</span><span id="p1">0%</span></div>
<div class="bar-bg"><div id="b1" class="bar-fill"></div></div>
</div>

<div class="stat-bar">
<div class="stat-meta"><span>SCALABILITY</span><span id="p2">0%</span></div>
<div class="bar-bg"><div id="b2" class="bar-fill"></div></div>
</div>

<div class="stat-bar">
<div class="stat-meta"><span>REDUNDANCY_RISK</span><span id="p3">0%</span></div>
<div class="bar-bg"><div id="b3" class="bar-fill"></div></div>
</div>

</div>

<div id="roadmapBox" class="roadmap-terminal"></div>

</div>

<div class="final-verdict">

<span class="verdict-label">THE_SYNTHESIZED_DESTINY</span>

<div id="finalPath"></div>

</div>

</div>

</div>

<script>

const form=document.getElementById("careerForm");
const results=document.getElementById("careerResults");
const roadmap=document.getElementById("roadmapBox");
const finalPath=document.getElementById("finalPath");

function setupDropdown(selectId,inputId){

const select=document.getElementById(selectId);
const input=document.getElementById(inputId);

select.addEventListener("change",()=>{

if(select.value==="Other"){
input.style.display="block";
input.focus();
}

else{
input.style.display="none";
input.value="";
}

});

}

setupDropdown("interestSelect","interestInput");
setupDropdown("skillsSelect","skillsInput");

function getValue(selectId,inputId){

const sel=document.getElementById(selectId);
const inp=document.getElementById(inputId);

return sel.value==="Other"?inp.value.trim():sel.value;

}

form.addEventListener("submit",async(e)=>{

e.preventDefault();

const interest=getValue("interestSelect","interestInput");
const skills=getValue("skillsSelect","skillsInput");

if(!interest||!skills)return;

results.style.display="block";
roadmap.innerHTML="";
finalPath.innerHTML="";

animateStat('b1','p1',92);
animateStat('b2','p2',88);
animateStat('b3','p3',12);

try{

const response=await fetch("/career_api",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
interest:interest,
skills:skills
})

});

const data=await response.json();

const aiText=data.reply||"⚠️ AI failed.";

const lines=aiText.split("\n");

for(let line of lines){

if(line.trim()!==""){
await typeTerminal(line,roadmap);
}

}

finalPath.innerHTML=
`🚀 ${interest} Specialist <span class="cursor"></span>`;

}

catch(error){

await typeTerminal("⚠️ AI engine failed.",roadmap);

}

});

function animateStat(barId,textId,target){

document.getElementById(barId).style.width=target+"%";

let curr=0;

const interval=setInterval(()=>{

if(curr>=target)clearInterval(interval);

document.getElementById(textId).innerText=curr+"%";

curr++;

},20);

}

function typeTerminal(text,container){

return new Promise(resolve=>{

const line=document.createElement("div");

line.className="terminal-line";

line.innerHTML=
`<span class="terminal-bullet">◈</span>
<span class="line-text"></span>`;

container.appendChild(line);

const textSpan=line.querySelector(".line-text");

let i=0;

const interval=setInterval(()=>{

textSpan.textContent+=text[i];

i++;

if(i>=text.length){
clearInterval(interval);
resolve();
}

},15);

});

}

</script>

</body>
</html>
